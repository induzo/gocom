name: "Bench http/middleware/valkeydempotency"

on:
  push:
    paths:
      - "http/middleware/valkeydempotency/**"
      - ".github/workflows/http_middleware_idempotency_valkey.yml"
      - ".github/workflows/_bench.yml"
    branches: [main]

concurrency:
  group: bench-http-middleware-valkeydempotency-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  bench:
    uses: ./.github/workflows/_bench.yml
    with:
      module: http/middleware/valkeydempotency
    secrets: inherit
